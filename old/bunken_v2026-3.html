/* ============================================================
   EVENTS
============================================================ */
document.addEventListener('click', async (event) => {
  const actionEl = event.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;
  const id = actionEl.dataset.id || '';
  const fileId = actionEl.dataset.fileId || '';
  const view = actionEl.dataset.view || '';
  const collectionId = actionEl.dataset.collectionId || '';
  const modal = actionEl.dataset.modal || '';
  const tab = actionEl.dataset.tab || '';
  const status = actionEl.dataset.status || '';
  try {
    switch (action) {
      case 'open-add-modal': openAddModal(); break;
      case 'close-modal': closeModal(modal); break;
      case 'switch-tab': switchTab(tab); break;
      case 'save-modal': await saveModal(); break;
      case 'copy-bib': cpBib(); break;
      case 'download-bib': dlBib(); break;
      case 'choose-storage-folder': await chooseStorageFolder(); break;
      case 'toggle-realtime-sync': await toggleRealtimeSync(); break;
      case 'import-from-folder': await importDataFromChosenFolderPrompt(); break;
      case 'sync-to-folder': await syncAllDataToChosenFolder(true); break;
      case 'clear-storage-folder': await clearStorageFolder(); break;
      case 'add-collection': addCollection(); break;
      case 'move-collection-up':
        event.stopPropagation();
        moveCollection(id, 'up');
        break;
      case 'move-collection-down':
        event.stopPropagation();
        moveCollection(id, 'down');
        break;
      case 'rename-collection':
        event.stopPropagation();
        renameCollection(id);
        break;
      case 'delete-collection':
        event.stopPropagation();
        deleteCollection(id);
        break;
      case 'set-view': setView(view); break;
      case 'select-paper': selectPaper(id); break;
      case 'toggle-star':
        event.stopPropagation();
        toggleStar(id);
        break;
      case 'toggle-abstract': toggleAbs(); break;
      case 'remove-tag': rmTagBtn(actionEl); break;
      case 'set-status': setStatus(id, status); break;
      case 'prompt-attach-pdf': promptAttachPdf(id); break;
      case 'open-pdf':
        event.preventDefault();
        await openStoredPdf(id);
        break;
      case 'remove-pdf': await removeAttachedPdf(id); break;
      case 'prompt-attach-supplement': promptAttachSupplement(id); break;
      case 'open-supplement':
        event.preventDefault();
        await openStoredSupplement(id, fileId);
        break;
      case 'remove-supplement':
        event.preventDefault();
        await removeSupplement(id, fileId);
        break;
      case 'open-edit-modal': openEditModal(id); break;
      case 'show-bib': showBib(id); break;
      case 'show-collection-bib': showCollectionBib(collectionId || (S.view.startsWith('col:') ? S.view.slice(4) : '')); break;
      case 'delete-paper': await delPaper(id); break;
      case 'do-fetch': await doFetch(); break;
      case 'parse-bib': doParseBib(); break;
      case 'trigger-pdf-input': {
        const input = document.getElementById('pdf-in');
        if (input) input.click();
        break;
      }
    }
  } catch (err) {
    console.error(err);
  }
});

document.addEventListener('input', (event) => {
  if (event.target.id === 'srch') onSearch(event.target.value);
});

document.addEventListener('change', async (event) => {
  const target = event.target;
  if (target.id === 'fa') onFilter('author', target.value);
  else if (target.id === 'fy') onFilter('year', target.value);
  else if (target.id === 'fj') onFilter('journal', target.value);
  else if (target.id === 'sort') onSort(target.value);
  else if (target.id === 'pdf-attach-global') await handleExistingPaperPdf(target);
  else if (target.id === 'supp-attach-global') await handleExistingPaperSupplement(target);
  else if (target.id === 'pdf-in') await handlePDF(target.files && target.files[0]);
  else if (target.dataset.action === 'set-collection') setCol(target.dataset.id, target.value);
  else if (target.dataset.action === 'notes-change') updNotes(target.dataset.id, target.value);
});

document.addEventListener('keydown', async (event) => {
  if (event.key==='Escape') document.querySelectorAll('.modal-ov.open').forEach(m=>closeModal(m.id));
  if (event.target.id === 'doi-in' && event.key === 'Enter') {
    event.preventDefault();
    await doFetch();
  }
  if (event.target.dataset.action === 'tag-input' && (event.key === 'Enter' || event.key === ',')) {
    addTag(event.target.dataset.id, event.target.value);
    event.target.value='';
    event.preventDefault();
  }
});

document.addEventListener('focusout', (event) => {
  if (event.target.dataset.action === 'tag-input' && event.target.value.trim()) {
    addTag(event.target.dataset.id, event.target.value);
    event.target.value='';
  }
});

document.addEventListener('dragover', (event) => {
  const drop = event.target.closest('#pdf-drop');
  if (!drop) return;
  event.preventDefault();
  drop.classList.add('dov');
});

document.addEventListener('dragleave', (event) => {
  const drop = event.target.closest('#pdf-drop');
  if (!drop) return;
  if (!drop.contains(event.relatedTarget)) drop.classList.remove('dov');
});

document.addEventListener('drop', async (event) => {
  const drop = event.target.closest('#pdf-drop');
  if (!drop) return;
  event.preventDefault();
  drop.classList.remove('dov');
  const file = event.dataTransfer?.files?.[0];
  if (file) await handlePDF(file);
});

document.querySelectorAll('.modal-ov').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) closeModal(el.id); });
});

============================================================ */
load();
recomputeLocalDiff();
render();
restoreStorageFolder().then(() => renderSidebar()).catch(err => console.error(err));
</script>
